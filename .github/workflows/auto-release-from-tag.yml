---
# SPDX-FileCopyrightText: NONE
# SPDX-License-Identifier: CC0-1.0

name: "Auto-release from tag"
permissions: {}
on:
  push:
    tags:
      - "v*"
      - "nightly"
  workflow_call:
    inputs:
      tag-name:
        required: true
        type: "string"

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: "${{ inputs.tag-name || startsWith(github.ref, 'refs/tags/') }}"
    concurrency:
      group: "${{ github.repository_id }}-${{ github.workflow }}-${{ inputs.tag-name || github.ref_name }}"
      cancel-in-progress: false
    permissions:
      contents: write # Needed to create a release
      id-token: write # Needed to attest build provenance
      attestations: write # Needed to attest build provenance

    steps:
      - name: "Checkout sources"
        uses: actions/checkout@v6
        with:
          lfs: false
      - name: "Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: "Use build cache"
        uses: actions/cache@v5
        timeout-minutes: 5
        with:
          key: "build-${{ hashFiles('conf/conf-full.inc.sh') }}"
          restore-keys: "build-"
          path: "cache/build"
          enableCrossOsArchive: true
      - name: "Use LFS cache"
        uses: actions/cache@v5
        timeout-minutes: 5
        with:
          key: "lfs-${{ hashFiles('conf/conf-lfs.inc.sh') }}"
          restore-keys: "lfs-"
          path: "cache/lfs"
          enableCrossOsArchive: true
      - name: "Install build dependencies"
        shell: bash
        run: |
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1 apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive NEEDRESTART_SUSPEND=1 apt-get install -y -qq \
            --no-install-recommends \
            xmlstarlet unzip wget
      - name: "Build flashable zips (all architectures, OSS edition)"
        id: "build"
        shell: bash
        timeout-minutes: 90
        run: |
          chmod +x .github/scripts/build-all-arch-zips.sh
          .github/scripts/build-all-arch-zips.sh oss "${{ github.workspace }}"
      - name: "Release logic"
        id: "release-logic"
        shell: bash
        env:
          INPUT_TAG_NAME: "${{ github.event_name == 'workflow_dispatch' && inputs.tag-name || '' }}"
          INPUT_TAG_NAME_VALID: "${{ startsWith(inputs.tag-name, 'v') }}"
        run: |
          # Release logic...
          CREATE_RELEASE='false'
          IS_NIGHTLY_RELEASE='false'
          IS_VERSION_RELEASE='false'
          IS_RC_RELEASE='false'
          IS_STABLE_RELEASE='false'

          if test -n "${INPUT_TAG_NAME?}"; then
            if test "${INPUT_TAG_NAME_VALID:?}" = 'true'; then
              TAG_NAME="${INPUT_TAG_NAME:?}"
              IS_VERSION_RELEASE='true'
            elif test "${INPUT_TAG_NAME:?}" = 'nightly'; then
              TAG_NAME='nightly'
              IS_NIGHTLY_RELEASE='true'
            else
              printf '%s\n' "::error::Invalid 'tag-name' parameter: ${INPUT_TAG_NAME?}"
              exit 3
            fi
          elif test '${{ github.ref_name }}' = 'nightly'; then
            TAG_NAME='nightly'
            IS_NIGHTLY_RELEASE='true'
          elif '${{ startsWith(github.ref, 'refs/tags/v') }}'; then
            TAG_NAME='${{ github.ref_name }}'
            IS_VERSION_RELEASE='true'
          else
            printf '%s\n' '::error::Invalid tag name: ${{ github.ref_name }}'
            exit 4
          fi

          case "${TAG_NAME:?}" in
            *-rc* | *-RC*) IS_RC_RELEASE='true' ;;
            *) ;;
          esac
          if test "${IS_VERSION_RELEASE:?}" = 'true' && test "${IS_RC_RELEASE:?}" = 'false'; then
            IS_STABLE_RELEASE='true'
          fi

          if test "${IS_NIGHTLY_RELEASE:?}" = 'true'; then
            if '${{ github.run_attempt == '1' && steps.build.outputs.ZIP_IS_ALPHA == 'true' && steps.build.outputs.ZIP_BUILD_TYPE_SUPPORTED == 'true' }}'; then
              CREATE_RELEASE='true'
            fi
          elif test "${IS_RC_RELEASE:?}" = 'true'; then
            if '${{ github.run_attempt == '1' && steps.build.outputs.ZIP_BUILD_TYPE_SUPPORTED == 'true' }}'; then
              CREATE_RELEASE='true'
            fi
          elif test "${IS_STABLE_RELEASE:?}" = 'true'; then
            if '${{ github.run_attempt == '1' && steps.build.outputs.ZIP_IS_ALPHA == 'false' && steps.build.outputs.ZIP_BUILD_TYPE_SUPPORTED == 'true' }}'; then
              CREATE_RELEASE='true'
            fi
          fi

          printf 'TAG_NAME=%s\n' "${TAG_NAME:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'CREATE_RELEASE=%s\n' "${CREATE_RELEASE:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'IS_NIGHTLY_RELEASE=%s\n' "${IS_NIGHTLY_RELEASE:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'IS_VERSION_RELEASE=%s\n' "${IS_VERSION_RELEASE:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'IS_RC_RELEASE=%s\n' "${IS_RC_RELEASE:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'IS_STABLE_RELEASE=%s\n' "${IS_STABLE_RELEASE:?}" 1>> "${GITHUB_OUTPUT?}"
          printf 'Create release? %s (tag: %s, rc: %s, stable: %s)\n' "${CREATE_RELEASE:?}" "${TAG_NAME:?}" "${IS_RC_RELEASE:?}" "${IS_STABLE_RELEASE:?}"
      - name: "Attest build provenance"
        id: "attest"
        uses: actions/attest-build-provenance@v4
        timeout-minutes: 10
        if: "${{ vars.ATTESTATION == 'true' && github.run_attempt == '1' && steps.build.outputs.ZIP_IS_ALPHA == 'false' && steps.build.outputs.ZIP_BUILD_TYPE_SUPPORTED == 'true' && steps.release-logic.outputs.IS_STABLE_RELEASE == 'true' }}"
        with:
          subject-path: "${{ steps.build.outputs.ZIP_FOLDER }}/*.zip"
          show-summary: false
      - name: "ZIP info"
        id: "info"
        shell: bash
        run: |
          # Retrieving informations...
          test -n '${{ steps.build.outputs.ZIP_FOLDER }}' || exit 3
          ZIP_VERSION='${{ steps.build.outputs.ZIP_VERSION }}'
          ZIP_ARCH_COUNT='${{ steps.build.outputs.ZIP_ARCH_COUNT }}'
          ZIP_SHORT_COMMIT_ID='${{ steps.build.outputs.ZIP_SHORT_COMMIT_ID }}'
          ZIP_IS_ALPHA='${{ steps.build.outputs.ZIP_IS_ALPHA }}'
          ZIP_BUILD_TYPE='${{ steps.build.outputs.ZIP_BUILD_TYPE }}'
          ZIP_BUILD_TYPE_SUPPORTED='${{ steps.build.outputs.ZIP_BUILD_TYPE_SUPPORTED }}'
          ZIP_ATTESTATION_URL='${{ steps.attest.outputs.attestation-url }}'
          # Displaying informations...
          printf '%s\n' "::notice::Arch builds: ${ZIP_ARCH_COUNT:-0} - Version: ${ZIP_VERSION:?} - Short commit ID: ${ZIP_SHORT_COMMIT_ID:?} - Is alpha: ${ZIP_IS_ALPHA:?} - Build type: ${ZIP_BUILD_TYPE:?}"
          printf '%s\n' "::notice::Build type supported: ${ZIP_BUILD_TYPE_SUPPORTED:?}"
          printf '%s\n' "::notice::Logs retention days: ${{ github.retention_days }}"
          printf '%s\n' "::notice::Attestation: ${ZIP_ATTESTATION_URL:-Missing}"
          if test -f '${{ steps.build.outputs.ZIP_FOLDER }}/arch-build-manifest.txt'; then
            printf '%s\n' '::notice::Build manifest:'
            sed 's/^/::notice::  /' '${{ steps.build.outputs.ZIP_FOLDER }}/arch-build-manifest.txt'
          fi
          # Preparing temp folder...
          export TMPDIR="${TMPDIR:-${RUNNER_TEMP:-${TMP:-${TEMP:-/tmp}}}}" || exit "${?}"
          release_label='release'
          if test '${{ steps.release-logic.outputs.IS_NIGHTLY_RELEASE }}' = 'true'; then
            release_label='nightly'
          elif test '${{ steps.release-logic.outputs.IS_RC_RELEASE }}' = 'true'; then
            release_label='rc'
          fi
          our_tmp_dir="$(mktemp -d -t -- "RELEASE-${release_label:?}-XXXXXX")" || exit "${?}"
          test -n "${our_tmp_dir?}" || exit "${?}"
          rm -r -f -- "${our_tmp_dir:?}"/* || exit "${?}"
          # Preparing release notes...
          release_type="${release_label:?}"
          chmod +x .github/scripts/prepare-multi-arch-release-notes.sh
          .github/scripts/prepare-multi-arch-release-notes.sh "${release_type:?}" \
            "${our_tmp_dir:?}/release-notes.md" \
            '${{ steps.build.outputs.ZIP_FOLDER }}' \
            "${ZIP_VERSION:?}" \
            "${ZIP_ATTESTATION_URL:-}" \
            '${{ github.server_url }}/${{ github.repository }}'
          printf 'ZIP_RELEASE_NOTES=%s\n' "${our_tmp_dir:?}/release-notes.md" 1>> "${GITHUB_OUTPUT?}"
          # Preparing attestation file...
          old_attest_file='${{ steps.attest.outputs.bundle-path }}'
          if test -n "${old_attest_file?}"; then
            new_attest_file="${our_tmp_dir:?}/${release_type:?}-$(basename -- "${old_attest_file:?}")" || exit "${?}"
            cp -f -T -- "${old_attest_file:?}" "${new_attest_file:?}" || exit "${?}"
            printf 'ZIP_ATTESTATION_FILE=%s\n' "${new_attest_file:?}" 1>> "${GITHUB_OUTPUT?}"
          fi
      - name: "Delete previous nightly release"
        uses: actions/github-script@v9
        if: "${{ steps.release-logic.outputs.CREATE_RELEASE == 'true' && steps.release-logic.outputs.IS_NIGHTLY_RELEASE == 'true' }}"
        with:
          retries: 3
          script: |
            /* jshint esversion: 11 */
            const response = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: 'nightly'
            }).catch(response => response);
            if(response && response.status === 404) {
              // There is no previous nightly release, nothing to do
            } else if(response && response.status >= 200 && response.status < 300 && response.data && response.data.id && response.data.tag_name === 'nightly') {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: response.data.id
              });
              console.log('Previous nightly release deleted: ' + response.data.name + ' (' + response.data.id + ')');
            } else {
              if(response && response.message) console.error('::error::' + response.message);
              throw new Error('getReleaseByTag failed: response is undefined or missing data.');
            }
      - name: "Create release"
        uses: softprops/action-gh-release@v3
        if: "${{ steps.release-logic.outputs.CREATE_RELEASE == 'true' }}"
        with:
          name: "${{ steps.release-logic.outputs.IS_NIGHTLY_RELEASE == 'true' && format('{0} nightly ({1} builds)', steps.build.outputs.ZIP_VERSION, steps.build.outputs.ZIP_ARCH_COUNT) || (steps.release-logic.outputs.IS_RC_RELEASE == 'true' && format('{0} ({1} builds)', steps.release-logic.outputs.TAG_NAME, steps.build.outputs.ZIP_ARCH_COUNT) || steps.release-logic.outputs.TAG_NAME) }}"
          tag_name: "${{ steps.release-logic.outputs.TAG_NAME }}"
          target_commitish: "${{ github.sha }}"
          body_path: "${{ steps.info.outputs.ZIP_RELEASE_NOTES }}"
          append_body: "${{ steps.release-logic.outputs.IS_STABLE_RELEASE == 'true' || steps.release-logic.outputs.IS_RC_RELEASE == 'true' }}"
          generate_release_notes: "${{ steps.release-logic.outputs.IS_STABLE_RELEASE == 'true' || steps.release-logic.outputs.IS_RC_RELEASE == 'true' }}"
          draft: false
          prerelease: "${{ steps.release-logic.outputs.IS_NIGHTLY_RELEASE == 'true' || steps.release-logic.outputs.IS_RC_RELEASE == 'true' }}"
          make_latest: "${{ steps.release-logic.outputs.IS_STABLE_RELEASE == 'true' }}"
          overwrite_files: false
          files: |
            ${{ steps.build.outputs.ZIP_FOLDER }}/*.zip*
            ${{ steps.info.outputs.ZIP_ATTESTATION_FILE }}
          fail_on_unmatched_files: true
